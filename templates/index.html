{% extends 'base.html' %}

{% block title %}MatchPy - Find Love{% endblock %}

{% block content %}
<div class="row justify-content-center text-center text-white mt-5">
    <div class="col-md-10">
        <h1 class="display-3 fw-bold mb-4">Find Your Perfect Match</h1>
        <p class="lead mb-5">Join thousands of people looking for meaningful connections.</p>
        
        <div class="d-grid gap-3 d-md-flex justify-content-center">
            <a href="{{ url_for('register') }}" class="btn btn-light btn-lg px-5 py-3">Get Started Free</a>
            <a href="{{ url_for('login') }}" class="btn btn-outline-light btn-lg px-5 py-3">Login</a>
        </div>
    </div>
</div>
{% endblock %}
